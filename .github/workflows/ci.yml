name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Typecheck Lint Test Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit and integration coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e smoke suite
        run: pnpm test:e2e

  protected-branch-gate:
    name: Protected Branch Gate
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs:
      - quality
      - e2e-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Confirm test and e2e gates passed
        run: echo "Unit/integration coverage and e2e smoke gates passed."
